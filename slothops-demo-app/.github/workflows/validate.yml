name: Validate CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      
      - name: Install dependencies
        run: npm ci
        
      # Note: skipping lint here since we didn't fully configure eslint manually for speed, 
      # but typechecking and tests are what SlothOps focuses on.
      - name: Typecheck
        run: npm run typecheck
        
      - name: Test
        run: npm test
